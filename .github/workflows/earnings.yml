name: earnings-watch

on:
  schedule:
    # 1日2回。VN企業の開示は大引け後17-18時ICT(19-20時JST)が多い:
    # 21:15 JST = 当日夕方の開示を当日中に検知 / 08:45 JST = 深夜分を日本の朝までに検知
    - cron: "15 12 * * *"
    - cron: "45 23 * * *"
  workflow_dispatch:

concurrency:
  group: earnings-watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect earnings (diff detect)
        run: python scripts/earnings_collector.py

      - name: Build board + brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/build_site.py

      - name: Commit & push
        run: |
          git config user.name "earnings-bot"
          git config user.email "actions@github.com"
          git add -A data docs
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git pull --rebase --autostash origin main
            git commit -m "auto: earnings watch $(date -u +%Y-%m-%dT%H:%M)Z"
            git push origin main
          fi
